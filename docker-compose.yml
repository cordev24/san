# MySan - Docker Compose para desarrollo local
# Versiones: PHP 8.2 + Apache + MySQL 8.0
#
# ⚠️  MIGRACIÓN AUTOMÁTICA:
#   Los archivos en docker/init/ se ejecutan en orden alfabético SOLO cuando
#   el volumen mysql_data está vacío (primera vez o después de: docker-compose down -v)
#   01_mysan_schema_data.sql → schema + datos de prueba
#   02_tasas_cambio.sql      → tabla de tasas BCV + configuración

services:
  # Servidor Web con PHP
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysan-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./uploads:/var/www/html/uploads
    environment:
      - TZ=America/Caracas
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mysan-network
    restart: unless-stopped

  # Base de Datos MySQL 8.0
  db:
    image: mysql:8.0
    container_name: mysan-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mysan
      MYSQL_USER: mysan_user
      MYSQL_PASSWORD: mysan_password
    volumes:
      - mysql_data:/var/lib/mysql
      # Directorio de inicialización: todos los .sql se ejecutan en orden alfabético
      - ./docker/init:/docker-entrypoint-initdb.d
    networks:
      - mysan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin para administración de DB
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: mysan-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      PMA_DATABASE: mysan
    depends_on:
      - db
    networks:
      - mysan-network
    restart: unless-stopped

networks:
  mysan-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
